services:
    task_manager_postgres:
        container_name: task_manager_postgres
        image: postgres:13
        restart: always
        healthcheck:
            test: [ "CMD", "pg_isready", "-q", "-d", "postgres", "-U", "root" ]
            timeout: 45s
            interval: 10s
            retries: 10
        environment:
            POSTGRES_USER: root
            POSTGRES_PASSWORD: ${ROOT_PASSWORD}
            POSTGRES_DB: ${POSTGRES_DB_NAME}
            APP_DB_USER: ${DB_USER}
            APP_DB_PASS: ${DB_USER_PASSWORD}
            APP_DB_NAME: ${POSTGRES_DB_NAME}
        volumes:
            - ./docker-entrypoint-initdb.d:/docker-entrypoint-initdb.d/
            - ./docker/pg-data:/var/lib/postgresql/data
        ports:
            - "5432:5432"
    task_manager_redis:
        container_name: task_manager_redis
        image: redis
        ports:
            - 6379:6379
        networks:
            - app-network
    task-manager-minio:
        container_name: task-manager-minio
        image: minio/minio
        command: server /data --console-address ":9001"
        environment:
            MINIO_ROOT_USER: ${ATTACHMENTS_AWS_ACCESS_KEY_ID:-minioadmin}
            MINIO_ROOT_PASSWORD: ${ATTACHMENTS_AWS_SECRET_ACCESS_KEY:-minioadmin}
        volumes:
            - ./docker/minio-data:/data
        ports:
            - "9000:9000"
            - "9001:9001"
        networks:
            - app-network
    task-manager-minio-bucket:
        container_name: task-manager-minio-bucket
        image: minio/mc
        depends_on:
            - task-manager-minio
        entrypoint: >
            /bin/sh -c "
            until mc alias set local http://task-manager-minio:9000 $${ATTACHMENTS_AWS_ACCESS_KEY_ID:-minioadmin} $${ATTACHMENTS_AWS_SECRET_ACCESS_KEY:-minioadmin}; do sleep 1; done;
            mc mb --ignore-existing local/$${ATTACHMENTS_AWS_BUCKET:-task-manager-attachments};
            "
        environment:
            ATTACHMENTS_AWS_ACCESS_KEY_ID: ${ATTACHMENTS_AWS_ACCESS_KEY_ID:-minioadmin}
            ATTACHMENTS_AWS_SECRET_ACCESS_KEY: ${ATTACHMENTS_AWS_SECRET_ACCESS_KEY:-minioadmin}
            ATTACHMENTS_AWS_BUCKET: ${ATTACHMENTS_AWS_BUCKET:-task-manager-attachments}
        networks:
            - app-network

#Docker Networks
networks:
    app-network:
        driver: bridge

#Volumes
volumes:
    dbdata:
        driver: local
